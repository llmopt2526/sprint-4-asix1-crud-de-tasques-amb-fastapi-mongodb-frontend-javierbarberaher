<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Pelis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Gestor de Pel·lícules</h1>
    
    <div style="background: #fff9e6; padding: 15px; border: 2px dashed #000; border-radius: 8px; margin-bottom: 20px;">
        <h3>Afegir Nova Pel·lícula</h3>
        <div class="form-group">
            <input type="text" id="titol" placeholder="Títol de la peli">
        </div>
        <div class="form-group">
            <textarea id="desc" placeholder="Descripció"></textarea>
        </div>
        <div style="display: flex; gap: 10px;">
            <select id="estat">
                <option value="pendent de veure">Pendent</option>
                <option value="vista">Vista</option>
            </select>
            <input type="number" id="puntuacio" placeholder="Nota (1-5)" min="1" max="5">
            <input type="text" id="genere" placeholder="Gènere">
        </div>
        <div class="form-group" style="margin-top:10px">
            <input type="text" id="usuari" placeholder="El teu nom d'usuari">
        </div>
        <button onclick="addMovie()">Guardar Pel·lícula!</button>
    </div>

    <hr>
    <h2>La meva llista</h2>
    <div id="movieList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
